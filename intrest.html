<!DOCTYPE html>
<html>
<head>
  <title>Compound Interest Calculator – Calculate Investment Growth</title>
<meta name="description" content="Calculate compound interest and see how your investments grow over time with this free online calculator.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Compound Interest</h1>

<div class="card">
  <input id="principal" placeholder="Principal">
  <input id="rate" placeholder="Rate %">
  <input id="years" placeholder="Years">
  <button onclick="calcInterest()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>Understanding Compound Interest</h2>
  <p>
    Compound interest allows your investment to grow faster by earning interest on both your initial amount and accumulated interest.
    Use this calculator to estimate long-term growth.
  </p>
</div>
<a href="index.html">← Back</a>

<script>
function calcInterest() {
  let p = parseFloat(document.getElementById("principal").value);
  let r = parseFloat(document.getElementById("rate").value)/100;
  let t = parseFloat(document.getElementById("years").value);

  let amount = p * Math.pow((1 + r), t);

  document.getElementById("result").innerText =
    "Final Amount: $" + amount.toFixed(2);
}
</script>

</body>
</html>
