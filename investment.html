<!DOCTYPE html>
<html>
<head>
  <title>Investment Calculator – Estimate Investment Growth</title>
<meta name="description" content="Estimate your investment growth over time with this free investment calculator. Plan your financial future today.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Investment Calculator</h1>

<div class="card">
  <input id="principal" placeholder="Initial Amount">
  <input id="rate" placeholder="Interest %">
  <input id="years" placeholder="Years">
  <button onclick="calcInvest()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>Investment Growth Explained</h2>
  <p>
    This calculator estimates how your investment grows over time using compound interest.
    It’s useful for planning savings and long-term financial goals.
  </p>
</div>
<a href="index.html">← Back Home</a>

<script>
function calcInvest() {
  let p = parseFloat(document.getElementById("principal").value);
  let r = parseFloat(document.getElementById("rate").value)/100;
  let t = parseFloat(document.getElementById("years").value);

  let total = p * Math.pow((1+r), t);

  document.getElementById("result").innerText =
    "Total: $" + total.toFixed(2);
}
</script>

</body>
</html>
