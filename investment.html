<!DOCTYPE html>
<html>
<head>
  <title>Investment Calculator</title>
  <meta name="description" content="Calculate investment growth with compound interest.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Investment Calculator</h1>

<div class="card">
  <input id="amount" placeholder="Initial Amount">
  <input id="rate" placeholder="Annual Return %">
  <input id="years" placeholder="Years">

  <button onclick="investCalc()">Calculate</button>

  <p id="investResult"></p>
  <div id="growth"></div>
</div>

<div class="card">
  <h2>How It Works</h2>
  <p>This calculator shows compound growth over time.</p>
</div>

<div class="card">
  <h2>Example</h2>
  <p>$1,000 at 7% for 10 years ≈ $1,967.</p>
</div>

<div class="card">
  <h2>FAQ</h2>
  <p><b>Does this compound yearly?</b> Yes.</p>
  <p><b>Can I use it for stocks?</b> Yes, as an estimate.</p>
</div>

<a href="index.html">← Back Home</a>

<script>
function investCalc() {
  let principal = parseFloat(document.getElementById("amount").value);
  let rate = parseFloat(document.getElementById("rate").value) / 100;
  let years = parseFloat(document.getElementById("years").value);

  if (!principal || !rate || !years) {
    document.getElementById("investResult").innerText = "Enter all values";
    return;
  }

  let value = principal;
  let table = "<table><tr><th>Year</th><th>Value</th></tr>";

  for (let i = 1; i <= years; i++) {
    value *= (1 + rate);
    table += `<tr><td>${i}</td><td>$${value.toFixed(2)}</td></tr>`;
  }

  table += "</table>";

  document.getElementById("investResult").innerText =
    "Final Value: $" + value.toFixed(2);

  document.getElementById("growth").innerHTML = table;
}
</script>

</body>
</html>
