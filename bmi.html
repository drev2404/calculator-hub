<!DOCTYPE html>
<html>
<head>
  <title>BMI Calculator (US Units)</title>
  <meta name="description" content="Calculate BMI using pounds and inches.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>BMI Calculator</h1>

<div class="card">

  <input id="weight" placeholder="Weight (lbs)">
  <input id="feet" placeholder="Height (feet)">
  <input id="inches" placeholder="Height (inches)">

  <button onclick="bmiCalc()">Calculate</button>

  <p id="bmiResult"></p>

</div>

<div class="card">
  <h2>How It Works</h2>
  <p>This BMI calculator uses US units (pounds and feet/inches).</p>
</div>

<div class="card">
  <h2>Example</h2>
  <p>180 lbs, 5'10" → Normal BMI range ~25.8</p>
</div>

<script>
function bmiCalc() {
  let w = parseFloat(document.getElementById("weight").value);
  let ft = parseFloat(document.getElementById("feet").value);
  let inch = parseFloat(document.getElementById("inches").value);

  if (!w || !ft) {
    document.getElementById("bmiResult").innerText = "Enter all values";
    return;
  }

  let heightInches = (ft * 12) + (inch || 0);

  let bmi = (w / (heightInches * heightInches)) * 703;

  let category = "";
  if (bmi < 18.5) category = "Underweight";
  else if (bmi < 25) category = "Normal";
  else if (bmi < 30) category = "Overweight";
  else category = "Obese";

  document.getElementById("bmiResult").innerText =
    "BMI: " + bmi.toFixed(1) + " (" + category + ")";
}
</script>

</body>
</html>
