<!DOCTYPE html>
<html>
<head>
  <title>BMI Calculator – Calculate Your Body Mass Index Instantly</title>
<meta name="description" content="Free BMI calculator to quickly calculate your body mass index and understand your health status.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>BMI Calculator</h1>

<div class="card">
  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (m)">
  <button onclick="calcBMI()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>What Is BMI?</h2>
  <p>
    Body Mass Index (BMI) is a simple calculation using your weight and height.
    It helps determine whether you are underweight, normal weight, overweight, or obese.
  </p>
</div>
<a href="index.html">← Back</a>

<script>
function calcBMI() {
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);

  let bmi = w / (h * h);

  document.getElementById("result").innerText =
    "BMI: " + bmi.toFixed(2);
}
</script>

</body>
</html>
