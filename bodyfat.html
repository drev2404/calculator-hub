<!DOCTYPE html>
<html>
<head>
  <title>Body Fat Calculator (US Units)</title>
  <meta name="description" content="Estimate body fat using US units.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Body Fat Calculator</h1>

<div class="card">

  <input id="weight" placeholder="Weight (lbs)">
  <input id="feet" placeholder="Height (feet)">
  <input id="inches" placeholder="Height (inches)">
  <input id="age" placeholder="Age">

  <select id="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <button onclick="calcFat()">Calculate</button>

  <p id="result"></p>

</div>

<div class="card">
  <h2>How It Works</h2>
  <p>Uses BMI-based estimation with US units (lbs + feet/inches).</p>
</div>

<div class="card">
  <h2>Example</h2>
  <p>200 lbs, 5'11", age 30 → ~18–22% body fat range</p>
</div>

<script>
function calcFat() {
  let w = parseFloat(document.getElementById("weight").value);
  let ft = parseFloat(document.getElementById("feet").value);
  let inch = parseFloat(document.getElementById("inches").value);
  let age = parseFloat(document.getElementById("age").value);
  let gender = document.getElementById("gender").value;

  if (!w || !ft || !age) {
    document.getElementById("result").innerText = "Enter all values";
    return;
  }

  let heightInches = (ft * 12) + (inch || 0);

  let bmi = (w / (heightInches * heightInches)) * 703;

  let fat;

  if (gender === "male") {
    fat = (1.20 * bmi) + (0.23 * age) - 16.2;
  } else {
    fat = (1.20 * bmi) + (0.23 * age) - 5.4;
  }

  document.getElementById("result").innerText =
    "Body Fat: " + fat.toFixed(1) + "%";
}
</script>

</body>
</html>
