<!DOCTYPE html>
<html>
<head>
  <title>Body Fat Calculator</title>
  <meta name="description" content="Estimate your body fat percentage easily.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Body Fat Calculator</h1>

<div class="card">
  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">
  <input id="age" placeholder="Age">
  <select id="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <button onclick="calcFat()">Calculate</button>
  <p id="result"></p>
</div>

<a href="index.html">← Back Home</a>

<script>
function calcFat() {
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);
  let a = parseFloat(document.getElementById("age").value);
  let g = document.getElementById("gender").value;

  let fat;

  if (g === "male") {
    fat = (1.20 * (w / ((h/100)*(h/100))) + 0.23 * a - 16.2);
  } else {
    fat = (1.20 * (w / ((h/100)*(h/100))) + 0.23 * a - 5.4);
  }

  document.getElementById("result").innerText =
    "Body Fat %: " + fat.toFixed(1) + "%";
}
</script>

</body>
</html>
