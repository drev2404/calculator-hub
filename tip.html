<!DOCTYPE html>
<html>
<head>
  <title>Tip Calculator – Calculate Tips and Split Bills Easily</title>
<meta name="description" content="Quickly calculate tips and split bills with this free tip calculator. Perfect for restaurants and dining out.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tip Calculator</h1>

<div class="card">
  <input id="bill" placeholder="Bill Amount">
  <input id="tip" placeholder="Tip %">
  <button onclick="calcTip()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>How to Use the Tip Calculator</h2>
  <p>
    Enter your bill amount and tip percentage to quickly calculate the tip and total bill.
    This is perfect for dining out or splitting bills with friends.
  </p>
</div>
<a href="index.html">← Back</a>

<script>
function calcTip() {
  let bill = parseFloat(document.getElementById("bill").value);
  let tip = parseFloat(document.getElementById("tip").value);

  let total = bill * (tip / 100);

  document.getElementById("result").innerText =
    "Tip: $" + total.toFixed(2);
}
</script>

</body>
</html>
