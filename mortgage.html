<!DOCTYPE html>
<html>
<head>
  <title>Mortgage Calculator – Estimate Monthly Home Payments</title>
<meta name="description" content="Estimate your monthly mortgage payments, interest, and loan terms with our easy-to-use mortgage calculator.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mortgage Calculator</h1>

<div class="card">
  <input id="loan" placeholder="Loan Amount">
  <input id="rate" placeholder="Interest %">
  <input id="years" placeholder="Years">
  <button onclick="calcMortgage()">Calculate</button>
  <p id="result"></p>
</div>

<a href="index.html">← Back</a>

<script>
function calcMortgage() {
  let p = parseFloat(document.getElementById("loan").value);
  let r = parseFloat(document.getElementById("rate").value) / 100 / 12;
  let n = parseFloat(document.getElementById("years").value) * 12;

  let x = Math.pow(1 + r, n);
  let payment = (p * x * r) / (x - 1);

  document.getElementById("result").innerText =
    "Monthly Payment: $" + payment.toFixed(2);
}
</script>

</body>
</html>
