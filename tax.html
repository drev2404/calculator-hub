<!DOCTYPE html>
<html>
<head>
  <title>Tax Calculator</title>
  <meta name="description" content="Estimate your federal income tax using brackets.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Tax Calculator</h1>

<div class="card">
  <input id="income" placeholder="Annual Income">

  <button onclick="taxCalc()">Calculate</button>

  <p id="taxResult"></p>
</div>

<div class="card">
  <h2>How It Works</h2>
  <p>This uses simplified U.S. tax brackets to estimate your taxes.</p>
</div>

<div class="card">
  <h2>Example</h2>
  <p>$50,000 income ≈ ~$6,300 tax estimate.</p>
</div>

<div class="card">
  <h2>FAQ</h2>
  <p><b>Is this exact?</b> No, it’s an estimate.</p>
  <p><b>Does it include deductions?</b> No.</p>
</div>

<a href="index.html">← Back Home</a>

<script>
function taxCalc() {
  let income = parseFloat(document.getElementById("income").value);

  if (!income) {
    document.getElementById("taxResult").innerText = "Enter income";
    return;
  }

  let tax = 0;

  if (income <= 11000) tax = income * 0.10;
  else if (income <= 44725)
    tax = 11000*0.10 + (income-11000)*0.12;
  else
    tax = 11000*0.10 + (44725-11000)*0.12 + (income-44725)*0.22;

  document.getElementById("taxResult").innerText =
    "Estimated Tax: $" + tax.toFixed(2);
}
</script>

</body>
</html>
