<!DOCTYPE html>
<html>
<head>
  <title>Time Calculator – Add and Subtract Time Easily</title>
<meta name="description" content="Add or subtract hours and minutes with this simple time calculator. Great for tracking work hours and schedules.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Time Calculator</h1>

<div class="card">
  <input id="hours" placeholder="Hours">
  <input id="minutes" placeholder="Minutes">
  <button onclick="calcTime()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>Using the Time Calculator</h2>
  <p>
    Add hours and minutes together to calculate total time.
    This is useful for tracking work hours, schedules, and durations.
  </p>
</div>
<a href="index.html">← Back Home</a>

<script>
function calcTime() {
  let h = parseFloat(document.getElementById("hours").value);
  let m = parseFloat(document.getElementById("minutes").value);

  let total = (h * 60) + m;

  document.getElementById("result").innerText =
    "Total Minutes: " + total;
}
</script>

</body>
</html>
