<!DOCTYPE html>
<html>
<head>
  <title>Percentage Calculator – Find Percentages Fast</title>
<meta name="description" content="Calculate percentages easily with this free percentage calculator. Find increases, decreases, and percentages instantly.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Percentage Calculator</h1>

<div class="card">
  <input id="value" placeholder="Value">
  <input id="percent" placeholder="Percent">
  <button onclick="calcPercent()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>Understanding Percentages</h2>
  <p>
    This calculator helps you find percentages, increases, and decreases quickly.
    Use it for discounts, markups, and everyday calculations.
  </p>
</div>
<a href="index.html">← Back</a>

<script>
function calcPercent() {
  let v = parseFloat(document.getElementById("value").value);
  let p = parseFloat(document.getElementById("percent").value);

  let result = (v * p) / 100;

  document.getElementById("result").innerText =
    "Result: " + result;
}
</script>

</body>
</html>
