<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator – Monthly Payment & Interest Calculator</title>
<meta name="description" content="Calculate your loan payments, interest, and total cost with this free loan calculator. Get accurate results instantly.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Loan Calculator</h1>

<div class="card">
  <input id="loan" placeholder="Loan Amount">
  <input id="rate" placeholder="Interest %">
  <input id="years" placeholder="Years">
  <button onclick="calcLoan()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>How to Use This Loan Calculator</h2>
  <p>
    Enter your loan amount, interest rate, and loan term to calculate your monthly payment.
    This tool helps you estimate how much you will pay each month and the total cost of your loan over time.
  </p>
</div>
<a href="index.html">← Back</a>

<script>
function calcLoan() {
  let p = parseFloat(document.getElementById("loan").value);
  let r = parseFloat(document.getElementById("rate").value) / 100 / 12;
  let n = parseFloat(document.getElementById("years").value) * 12;

  let x = Math.pow(1 + r, n);
  let payment = (p * x * r) / (x - 1);

  document.getElementById("result").innerText =
    "Monthly: $" + payment.toFixed(2);
}
</script>

</body>
</html>
