<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator</title>
  <meta name="description" content="Calculate loan payments and view amortization schedule.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Loan Calculator</h1>

<div class="card">
  <input id="loan" placeholder="Loan amount">
  <input id="interest" placeholder="Interest %">
  <input id="years" placeholder="Years">

  <button onclick="loanCalc()">Calculate</button>

  <p id="loanResult"></p>
  <div id="schedule"></div>
</div>

<div class="card">
  <h2>How It Works</h2>
  <p>This calculator computes your monthly payment and shows a full payment schedule.</p>
</div>

<div class="card">
  <h2>Example</h2>
  <p>$10,000 loan at 5% for 5 years ≈ $188/month.</p>
</div>

<div class="card">
  <h2>FAQ</h2>
  <p><b>Does this include interest?</b> Yes.</p>
  <p><b>Is it accurate?</b> Yes for standard loans.</p>
</div>

<a href="index.html">← Back Home</a>

<script>
function loanCalc() {
  let P = parseFloat(document.getElementById("loan").value);
  let r = parseFloat(document.getElementById("interest").value) / 100 / 12;
  let n = parseFloat(document.getElementById("years").value) * 12;

  if (!P || !r || !n) {
    document.getElementById("loanResult").innerText = "Enter all values";
    return;
  }

  let monthly = (P * r) / (1 - Math.pow(1 + r, -n));

  document.getElementById("loanResult").innerText =
    "Monthly Payment: $" + monthly.toFixed(2);

  let balance = P;
  let table = "<table><tr><th>Month</th><th>Payment</th><th>Interest</th><th>Balance</th></tr>";

  for (let i = 1; i <= n; i++) {
    let interest = balance * r;
    let principal = monthly - interest;
    balance -= principal;

    table += `<tr>
      <td>${i}</td>
      <td>$${monthly.toFixed(2)}</td>
      <td>$${interest.toFixed(2)}</td>
      <td>$${Math.max(balance,0).toFixed(2)}</td>
    </tr>`;
  }

  table += "</table>";
  document.getElementById("schedule").innerHTML = table;
}
</script>

</body>
</html>
