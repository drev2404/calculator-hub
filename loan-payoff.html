<!DOCTYPE html>
<html>
<head>
  <title>Loan Payoff Calculator</title>
  <meta name="description" content="Calculate how long it will take to pay off your loan faster with extra payments.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Loan Payoff Calculator</h1>

<div class="card">
  <input id="balance" placeholder="Loan Balance">
  <input id="payment" placeholder="Monthly Payment">
  <input id="interest" placeholder="Interest %">
  <button onclick="calcPayoff()">Calculate</button>
  <p id="result"></p>
</div>

<a href="index.html">← Back Home</a>

<script>
function calcPayoff() {
  let b = parseFloat(document.getElementById("balance").value);
  let p = parseFloat(document.getElementById("payment").value);
  let r = parseFloat(document.getElementById("interest").value) / 100 / 12;

  let months = 0;

  while (b > 0 && months < 1000) {
    b = b + (b * r) - p;
    months++;
  }

  let years = (months / 12).toFixed(1);

  document.getElementById("result").innerText =
    "Payoff Time: " + months + " months (" + years + " years)";
}
</script>

</body>
</html>
