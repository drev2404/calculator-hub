<!DOCTYPE html>
<html>
<head>
  <title>Calculator Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Calculator Hub</h1>
<p>Free online calculators for everyday use</p>

<div class="grid">

  <div class="card">
    <h2>Basic Calculator</h2>
    <input id="calcInput" placeholder="e.g. 2+2">
    <button onclick="runBasic()">Calculate</button>
    <p id="calcResult"></p>
  </div>

  <div class="card">
    <h2>Tip Calculator</h2>
    <input id="bill" placeholder="Bill amount">
    <input id="tip" placeholder="Tip %">
    <button onclick="tipCalc()">Calculate</button>
    <p id="tipResult"></p>
  </div>

  <div class="card">
    <h2>BMI Calculator</h2>
    <input id="weight" placeholder="Weight (kg)">
    <input id="height" placeholder="Height (m)">
    <button onclick="bmiCalc()">Calculate</button>
    <p id="bmiResult"></p>
  </div>

  <div class="card">
    <h2>Loan Calculator</h2>
    <input id="loan" placeholder="Loan amount">
    <input id="interest" placeholder="Interest %">
    <input id="years" placeholder="Years">
    <button onclick="loanCalc()">Calculate</button>
    <p id="loanResult"></p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
