<!DOCTYPE html>
<html>
<head>
  <title>Salary Calculator – Hourly to Annual Salary</title>
  <meta name="description" content="Convert hourly wage to yearly salary instantly with this free salary calculator.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Salary Calculator</h1>

<div class="card">
  <input id="hourly" placeholder="Hourly Rate">
  <input id="hours" placeholder="Hours per Week">
  <button onclick="calcSalary()">Calculate</button>
  <p id="result"></p>
</div>

<a href="index.html">← Back Home</a>

<script>
function calcSalary() {
  let h = parseFloat(document.getElementById("hourly").value);
  let w = parseFloat(document.getElementById("hours").value);

  let yearly = h * w * 52;

  document.getElementById("result").innerText =
    "Yearly Salary: $" + yearly.toFixed(2);
}
</script>

</body>
</html>
