<!DOCTYPE html>
<html>
<head>
  <title>Calorie Calculator – Daily Calorie Needs Calculator</title>
<meta name="description" content="Find out how many calories you need daily based on your goals with this free calorie calculator.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Calorie Calculator</h1>

<div class="card">
  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">
  <input id="age" placeholder="Age">
  <button onclick="calcCalories()">Calculate</button>
  <p id="result"></p>
</div>
<div class="card">
  <h2>Daily Calorie Needs</h2>
  <p>
    This calculator estimates how many calories you need daily based on your body metrics.
    It’s useful for weight loss, maintenance, or muscle gain goals.
  </p>
</div>
<a href="index.html">← Back Home</a>

<script>
function calcCalories() {
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);
  let a = parseFloat(document.getElementById("age").value);

  let calories = 10*w + 6.25*h - 5*a + 5;

  document.getElementById("result").innerText =
    "Daily Calories: " + calories.toFixed(0);
}
</script>

</body>
</html>
